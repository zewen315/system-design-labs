# Docker's embedded DNS. Without this, proxy_pass resolves each upstream
# hostname once at nginx startup and caches the IP for the process lifetime —
# so rebuilding/recreating a backend service (which gets a new container IP)
# silently misroutes through the gateway until nginx itself is restarted.
resolver 127.0.0.11 valid=10s;

server {
    listen 80;

    location /api/user-service/ {
        set $upstream http://user-service:8000;
        rewrite ^/api/user-service/(.*)$ /$1 break;
        proxy_pass $upstream;
    }

    location /api/tweet-service/ {
        set $upstream http://tweet-service:8000;
        rewrite ^/api/tweet-service/(.*)$ /$1 break;
        proxy_pass $upstream;
    }

    location /api/timeline-service/ {
        set $upstream http://timeline-service:8000;
        rewrite ^/api/timeline-service/(.*)$ /$1 break;
        proxy_pass $upstream;
    }
}
