# Docker's embedded DNS. See nginx.conf for why this matters — without it,
# proxy_pass caches each upstream's IP at startup and silently misroutes
# after any backend container is recreated.
resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name twitter.zewenw.com;

    # Left open on plain HTTP for Let's Encrypt's renewal challenges —
    # everything else on :80 redirects to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name twitter.zewenw.com;

    ssl_certificate /etc/letsencrypt/live/twitter.zewenw.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/twitter.zewenw.com/privkey.pem;

    location /api/user-service/ {
        set $upstream http://user-service:8000;
        rewrite ^/api/user-service/(.*)$ /$1 break;
        proxy_pass $upstream;
    }

    location /api/tweet-service/ {
        set $upstream http://tweet-service:8000;
        rewrite ^/api/tweet-service/(.*)$ /$1 break;
        proxy_pass $upstream;
    }

    location /api/timeline-service/ {
        set $upstream http://timeline-service:8000;
        rewrite ^/api/timeline-service/(.*)$ /$1 break;
        proxy_pass $upstream;
    }

    # /media/<key> maps straight onto MinIO's path-style bucket address
    # (the bucket is literally named "media"), so no prefix stripping —
    # just pass the request through untouched. $request_uri specifically
    # (not a bare proxy_pass) so presigned-URL query params (the auth
    # signature) reach MinIO byte-for-byte, unmodified by normalization.
    #
    # proxy_set_header Host is required here specifically: nginx's default
    # is to rewrite Host to the upstream address (minio:9000), which is
    # invisible for the /api/* routes above (FastAPI ignores Host) but
    # breaks S3 signature validation, since Host is part of what got
    # signed into the presigned URL (MINIO_PUBLIC_URL's host).
    location /media/ {
        set $upstream http://minio:9000;
        proxy_set_header Host $http_host;
        proxy_pass $upstream$request_uri;
    }

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
}
