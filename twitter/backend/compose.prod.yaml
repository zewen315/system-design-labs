services:
  tweet-db:
    image: postgres:16-alpine
    command: postgres -c shared_buffers=32MB -c max_connections=20
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tweets
    volumes:
      - tweet_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  tweet-service:
    build: ./services/tweet-service
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@tweet-db:5432/tweets
      MINIO_INTERNAL_URL: http://minio:9000
      MINIO_PUBLIC_URL: https://twitter.zewenw.com
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: 8cd82b3b3d9263e2f76f18cf7c518210
      MINIO_BUCKET: media
    depends_on:
      tweet-db:
        condition: service_healthy
      minio:
        condition: service_healthy

  tweet-outbox-relay:
    build: ./services/tweet-service
    command: ["uv", "run", "python", "-m", "app.outbox_relay"]
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@tweet-db:5432/tweets
      REDIS_URL: redis://stream-redis:6379/0
    depends_on:
      tweet-db:
        condition: service_healthy
      stream-redis:
        condition: service_healthy

  stream-redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  user-db:
    image: postgres:16-alpine
    command: postgres -c shared_buffers=32MB -c max_connections=20
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  user-service:
    build: ./services/user-service
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@user-db:5432/users
      MINIO_INTERNAL_URL: http://minio:9000
      MINIO_PUBLIC_URL: https://twitter.zewenw.com
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: 8cd82b3b3d9263e2f76f18cf7c518210
      MINIO_BUCKET: media
    depends_on:
      user-db:
        condition: service_healthy
      minio:
        condition: service_healthy

  timeline-redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  timeline-service:
    build: ./services/timeline-service
    environment:
      STREAM_REDIS_URL: redis://stream-redis:6379/0
      TIMELINE_REDIS_URL: redis://timeline-redis:6379/0
      USER_SERVICE_URL: http://user-service:8000
      TWEET_SERVICE_URL: http://tweet-service:8000
    depends_on:
      timeline-redis:
        condition: service_healthy

  timeline-fanout-worker:
    build: ./services/timeline-service
    command: ["uv", "run", "python", "-m", "app.fanout_worker"]
    environment:
      STREAM_REDIS_URL: redis://stream-redis:6379/0
      TIMELINE_REDIS_URL: redis://timeline-redis:6379/0
      USER_SERVICE_URL: http://user-service:8000
      TWEET_SERVICE_URL: http://tweet-service:8000
    depends_on:
      stream-redis:
        condition: service_healthy
      timeline-redis:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: 8cd82b3b3d9263e2f76f18cf7c518210
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin 8cd82b3b3d9263e2f76f18cf7c518210 &&
      mc mb --ignore-existing local/media &&
      mc anonymous set download local/media
      "
    restart: "no"

  api-gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./gateway/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./certbot-webroot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - user-service
      - tweet-service
      - timeline-service
      - minio

volumes:
  tweet_db_data:
  user_db_data:
  minio_data:
