services:
  tweet-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tweets
    ports:
      - "5432:5432"
    volumes:
      - tweet_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  tweet-service:
    build: ./services/tweet-service
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@tweet-db:5432/tweets
      MINIO_INTERNAL_URL: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:8080
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: media
    ports:
      - "8000:8000"
    depends_on:
      tweet-db:
        condition: service_healthy
      minio:
        condition: service_healthy

  tweet-outbox-relay:
    build: ./services/tweet-service
    command: ["uv", "run", "python", "-m", "app.outbox_relay"]
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@tweet-db:5432/tweets
      REDIS_URL: redis://stream-redis:6379/0
    depends_on:
      tweet-db:
        condition: service_healthy
      stream-redis:
        condition: service_healthy

  stream-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users
    ports:
      - "5433:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  user-service:
    build: ./services/user-service
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@user-db:5432/users
      TIMELINE_SERVICE_URL: http://timeline-service:8000
      SEARCH_SERVICE_URL: http://search-service:8000
      MINIO_INTERNAL_URL: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:8080
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: media
    ports:
      - "8001:8000"
    depends_on:
      user-db:
        condition: service_healthy
      minio:
        condition: service_healthy

  timeline-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  timeline-service:
    build: ./services/timeline-service
    environment:
      STREAM_REDIS_URL: redis://stream-redis:6379/0
      TIMELINE_REDIS_URL: redis://timeline-redis:6379/0
      USER_SERVICE_URL: http://user-service:8000
      TWEET_SERVICE_URL: http://tweet-service:8000
    ports:
      - "8002:8000"
    depends_on:
      timeline-redis:
        condition: service_healthy

  timeline-fanout-worker:
    build: ./services/timeline-service
    command: ["uv", "run", "python", "-m", "app.fanout_worker"]
    environment:
      STREAM_REDIS_URL: redis://stream-redis:6379/0
      TIMELINE_REDIS_URL: redis://timeline-redis:6379/0
      USER_SERVICE_URL: http://user-service:8000
      TWEET_SERVICE_URL: http://tweet-service:8000
    depends_on:
      stream-redis:
        condition: service_healthy
      timeline-redis:
        condition: service_healthy

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      # Required just to pass the image's own startup precondition check,
      # even with the security plugin disabled above (the entrypoint script
      # checks for this var before it checks whether security is enabled at
      # all). It's never actually enforced since the plugin is off.
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "Twitterlab_dev_2025!"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  search-service:
    build: ./services/search-service
    environment:
      OPENSEARCH_URL: http://opensearch:9200
      STREAM_REDIS_URL: redis://stream-redis:6379/0
      TWEET_SERVICE_URL: http://tweet-service:8000
      USER_SERVICE_URL: http://user-service:8000
    ports:
      - "8003:8000"
    depends_on:
      opensearch:
        condition: service_healthy
      stream-redis:
        condition: service_healthy

  search-indexer-worker:
    build: ./services/search-service
    command: ["uv", "run", "python", "-m", "app.indexer_worker"]
    environment:
      OPENSEARCH_URL: http://opensearch:9200
      STREAM_REDIS_URL: redis://stream-redis:6379/0
      TWEET_SERVICE_URL: http://tweet-service:8000
      USER_SERVICE_URL: http://user-service:8000
    depends_on:
      opensearch:
        condition: service_healthy
      stream-redis:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb --ignore-existing local/media &&
      mc anonymous set download local/media
      "
    restart: "no"

  api-gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - user-service
      - tweet-service
      - timeline-service
      - search-service
      - minio

volumes:
  tweet_db_data:
  user_db_data:
  minio_data:
  opensearch_data:
