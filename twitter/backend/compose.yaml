services:
  tweet-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tweets
    ports:
      - "5432:5432"
    volumes:
      - tweet_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  tweet-service:
    build: ./services/tweet-service
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@tweet-db:5432/tweets
    ports:
      - "8000:8000"
    depends_on:
      tweet-db:
        condition: service_healthy

  tweet-outbox-relay:
    build: ./services/tweet-service
    command: ["uv", "run", "python", "-m", "app.outbox_relay"]
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@tweet-db:5432/tweets
      REDIS_URL: redis://stream-redis:6379/0
    depends_on:
      tweet-db:
        condition: service_healthy
      stream-redis:
        condition: service_healthy

  stream-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users
    ports:
      - "5433:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  user-service:
    build: ./services/user-service
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@user-db:5432/users
    ports:
      - "8001:8000"
    depends_on:
      user-db:
        condition: service_healthy

  timeline-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  timeline-service:
    build: ./services/timeline-service
    environment:
      STREAM_REDIS_URL: redis://stream-redis:6379/0
      TIMELINE_REDIS_URL: redis://timeline-redis:6379/0
      USER_SERVICE_URL: http://user-service:8000
      TWEET_SERVICE_URL: http://tweet-service:8000
    ports:
      - "8002:8000"
    depends_on:
      timeline-redis:
        condition: service_healthy

  timeline-fanout-worker:
    build: ./services/timeline-service
    command: ["uv", "run", "python", "-m", "app.fanout_worker"]
    environment:
      STREAM_REDIS_URL: redis://stream-redis:6379/0
      TIMELINE_REDIS_URL: redis://timeline-redis:6379/0
      USER_SERVICE_URL: http://user-service:8000
      TWEET_SERVICE_URL: http://tweet-service:8000
    depends_on:
      stream-redis:
        condition: service_healthy
      timeline-redis:
        condition: service_healthy

  api-gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - user-service
      - tweet-service
      - timeline-service

volumes:
  tweet_db_data:
  user_db_data:
