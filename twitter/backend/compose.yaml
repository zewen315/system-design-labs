services:
  tweet-db:
    image: postgres:16-alpine
    command: postgres -c shared_buffers=32MB -c max_connections=20
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tweets
    volumes:
      - tweet_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  tweet-service:
    build: ./services/tweet-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@tweet-db:5432/tweets
      MINIO_INTERNAL_URL: http://minio:9000
      MINIO_PUBLIC_URL: https://twitter.zewenw.com
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: 8cd82b3b3d9263e2f76f18cf7c518210
      MINIO_BUCKET: media
    depends_on:
      tweet-db:
        condition: service_healthy
      minio:
        condition: service_healthy

  tweet-outbox-relay:
    build: ./services/tweet-service
    command: ["uv", "run", "python", "-m", "app.outbox_relay"]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@tweet-db:5432/tweets
      REDIS_URL: redis://stream-redis:6379/0
    depends_on:
      tweet-db:
        condition: service_healthy
      stream-redis:
        condition: service_healthy

  stream-redis:
    image: redis:7-alpine
    restart: unless-stopped
    # The image's default redis.conf already has RDB save points enabled,
    # but without a volume the snapshot file lives in the container's
    # writable layer - `docker compose down` (removes containers, not just
    # stops them) discards it exactly like it would any other unpersisted
    # container state. Learned this the hard way: a stack-wide `down` here
    # silently wiped the whole tweet-events stream and every timeline.
    volumes:
      - stream_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  user-db:
    image: postgres:16-alpine
    command: postgres -c shared_buffers=32MB -c max_connections=20
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  user-service:
    build: ./services/user-service
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@user-db:5432/users
      TIMELINE_SERVICE_URL: http://timeline-service:8000
      SEARCH_SERVICE_URL: http://search-service:8000
      MINIO_INTERNAL_URL: http://minio:9000
      MINIO_PUBLIC_URL: https://twitter.zewenw.com
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: 8cd82b3b3d9263e2f76f18cf7c518210
      MINIO_BUCKET: media
    depends_on:
      user-db:
        condition: service_healthy
      minio:
        condition: service_healthy

  timeline-redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Same reasoning as stream-redis above - this holds every user's
    # timeline and all notifications, and was losing both on every
    # container recreation with no volume backing it.
    volumes:
      - timeline_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  timeline-service:
    build: ./services/timeline-service
    restart: unless-stopped
    environment:
      STREAM_REDIS_URL: redis://stream-redis:6379/0
      TIMELINE_REDIS_URL: redis://timeline-redis:6379/0
      USER_SERVICE_URL: http://user-service:8000
      TWEET_SERVICE_URL: http://tweet-service:8000
    depends_on:
      timeline-redis:
        condition: service_healthy

  timeline-fanout-worker:
    build: ./services/timeline-service
    command: ["uv", "run", "python", "-m", "app.fanout_worker"]
    restart: unless-stopped
    environment:
      STREAM_REDIS_URL: redis://stream-redis:6379/0
      TIMELINE_REDIS_URL: redis://timeline-redis:6379/0
      USER_SERVICE_URL: http://user-service:8000
      TWEET_SERVICE_URL: http://tweet-service:8000
    depends_on:
      stream-redis:
        condition: service_healthy
      timeline-redis:
        condition: service_healthy

  # No host ports published, same as every other internal service here —
  # only api-gateway is reachable from outside. A single C++ binary with no
  # JVM to size a heap for - boots in seconds and settles under 100MB at
  # this project's data volume, vs. OpenSearch's 512MB-1GB heap requirement
  # and multi-minute cold start.
  typesense:
    image: typesense/typesense:27.1
    command: ["--data-dir", "/data", "--api-key", "oD1bDXSb4Oo42yRH5VznA8a7W-x-QUrspvfY4zK3PI0"]
    restart: unless-stopped
    volumes:
      - typesense_data:/data
    healthcheck:
      # The image has no curl/wget - bash's /dev/tcp is the only HTTP-capable
      # tool actually present in it, and CMD-SHELL always runs via /bin/sh
      # (not bash), which doesn't support /dev/tcp - has to be invoked
      # explicitly as the CMD array's own executable.
      test:
        [
          "CMD",
          "bash",
          "-c",
          'exec 3<>/dev/tcp/127.0.0.1/8108 && printf "GET /health HTTP/1.0\r\n\r\n" >&3 && head -c 15 <&3 | grep -q "200 OK"',
        ]
      interval: 2s
      timeout: 5s
      retries: 20

  search-service:
    build: ./services/search-service
    restart: unless-stopped
    environment:
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: "8108"
      TYPESENSE_API_KEY: "oD1bDXSb4Oo42yRH5VznA8a7W-x-QUrspvfY4zK3PI0"
      STREAM_REDIS_URL: redis://stream-redis:6379/0
      TWEET_SERVICE_URL: http://tweet-service:8000
      USER_SERVICE_URL: http://user-service:8000
    depends_on:
      typesense:
        condition: service_healthy
      stream-redis:
        condition: service_healthy

  search-indexer-worker:
    build: ./services/search-service
    command: ["uv", "run", "python", "-m", "app.indexer_worker"]
    restart: unless-stopped
    environment:
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: "8108"
      TYPESENSE_API_KEY: "oD1bDXSb4Oo42yRH5VznA8a7W-x-QUrspvfY4zK3PI0"
      STREAM_REDIS_URL: redis://stream-redis:6379/0
      TWEET_SERVICE_URL: http://tweet-service:8000
      USER_SERVICE_URL: http://user-service:8000
    depends_on:
      typesense:
        condition: service_healthy
      stream-redis:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: 8cd82b3b3d9263e2f76f18cf7c518210
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin 8cd82b3b3d9263e2f76f18cf7c518210 &&
      mc mb --ignore-existing local/media &&
      mc anonymous set download local/media
      "

  api-gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./gateway/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./certbot-webroot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - user-service
      - tweet-service
      - timeline-service
      - search-service
      - minio

volumes:
  tweet_db_data:
  user_db_data:
  minio_data:
  typesense_data:
  stream_redis_data:
  timeline_redis_data:
