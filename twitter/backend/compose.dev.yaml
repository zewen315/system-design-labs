services:
  tweet-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tweets
    ports:
      - "5432:5432"
    volumes:
      - tweet_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  tweet-service:
    build: ./services/tweet-service
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@tweet-db:5432/tweets
      MINIO_INTERNAL_URL: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:8080
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: media
    ports:
      - "8000:8000"
    depends_on:
      tweet-db:
        condition: service_healthy
      minio:
        condition: service_healthy

  tweet-outbox-relay:
    build: ./services/tweet-service
    command: ["uv", "run", "python", "-m", "app.outbox_relay"]
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@tweet-db:5432/tweets
      REDIS_URL: redis://stream-redis:6379/0
    depends_on:
      tweet-db:
        condition: service_healthy
      stream-redis:
        condition: service_healthy

  stream-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users
    ports:
      - "5433:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  user-service:
    build: ./services/user-service
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@user-db:5432/users
      TIMELINE_SERVICE_URL: http://timeline-service:8000
      SEARCH_SERVICE_URL: http://search-service:8000
      MINIO_INTERNAL_URL: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:8080
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: media
    ports:
      - "8001:8000"
    depends_on:
      user-db:
        condition: service_healthy
      minio:
        condition: service_healthy

  timeline-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  timeline-service:
    build: ./services/timeline-service
    environment:
      STREAM_REDIS_URL: redis://stream-redis:6379/0
      TIMELINE_REDIS_URL: redis://timeline-redis:6379/0
      USER_SERVICE_URL: http://user-service:8000
      TWEET_SERVICE_URL: http://tweet-service:8000
    ports:
      - "8002:8000"
    depends_on:
      timeline-redis:
        condition: service_healthy

  timeline-fanout-worker:
    build: ./services/timeline-service
    command: ["uv", "run", "python", "-m", "app.fanout_worker"]
    environment:
      STREAM_REDIS_URL: redis://stream-redis:6379/0
      TIMELINE_REDIS_URL: redis://timeline-redis:6379/0
      USER_SERVICE_URL: http://user-service:8000
      TWEET_SERVICE_URL: http://tweet-service:8000
    depends_on:
      stream-redis:
        condition: service_healthy
      timeline-redis:
        condition: service_healthy

  typesense:
    image: typesense/typesense:27.1
    command: ["--data-dir", "/data", "--api-key", "xyz", "--enable-cors"]
    ports:
      - "8108:8108"
    volumes:
      - typesense_data:/data
    healthcheck:
      # The image has no curl/wget - bash's /dev/tcp is the only HTTP-capable
      # tool actually present in it, and CMD-SHELL always runs via /bin/sh
      # (not bash), which doesn't support /dev/tcp - has to be invoked
      # explicitly as the CMD array's own executable.
      test:
        [
          "CMD",
          "bash",
          "-c",
          'exec 3<>/dev/tcp/127.0.0.1/8108 && printf "GET /health HTTP/1.0\r\n\r\n" >&3 && head -c 15 <&3 | grep -q "200 OK"',
        ]
      interval: 2s
      timeout: 5s
      retries: 20

  search-service:
    build: ./services/search-service
    environment:
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: "8108"
      TYPESENSE_API_KEY: xyz
      STREAM_REDIS_URL: redis://stream-redis:6379/0
      TWEET_SERVICE_URL: http://tweet-service:8000
      USER_SERVICE_URL: http://user-service:8000
    ports:
      - "8003:8000"
    depends_on:
      typesense:
        condition: service_healthy
      stream-redis:
        condition: service_healthy

  search-indexer-worker:
    build: ./services/search-service
    command: ["uv", "run", "python", "-m", "app.indexer_worker"]
    environment:
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: "8108"
      TYPESENSE_API_KEY: xyz
      STREAM_REDIS_URL: redis://stream-redis:6379/0
      TWEET_SERVICE_URL: http://tweet-service:8000
      USER_SERVICE_URL: http://user-service:8000
    depends_on:
      typesense:
        condition: service_healthy
      stream-redis:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb --ignore-existing local/media &&
      mc anonymous set download local/media
      "
    restart: "no"

  api-gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - user-service
      - tweet-service
      - timeline-service
      - search-service
      - minio

volumes:
  tweet_db_data:
  user_db_data:
  minio_data:
  typesense_data:
